trigger:
  branches:
    include:
      - assignment-2

pool:
  vmImage: ubuntu-latest

steps:
- task: AzureCLI@2
  inputs:
    azureSubscription: 'SC-UDST-CCIT-DSAI3202'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -e
      echo "Running Azure ML pipeline..."
      az extension add -n ml -y || az extension update -n ml
      az ml job create \
        --file jobs/train_job.yml \
        --resource-group rg-60301042 \
        --workspace-name Amazon-Electronics-Lab-60301042
