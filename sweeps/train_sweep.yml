$schema: https://azuremlschemas.azureedge.net/latest/sweepJob.schema.json
type: sweep
display_name: amazon_review_model_sweep
experiment_name: amazon_review_training_experiment

compute: azureml:cpu-cluster

sampling_algorithm: random

objective:
  goal: maximize
  primary_metric: val_f1

trial:
  command: >
    python train.py
    --train_data ${{inputs.train_data}}
    --val_data ${{inputs.val_data}}
    --test_data ${{inputs.test_data}}
    --output ${{outputs.model_output}}
    --C ${{search_space.C}}
    --max_iter ${{search_space.max_iter}}
  code: ../src
  environment:
    image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04
    conda_file: ../env/conda.yml

inputs:
  train_data:
    type: uri_folder
    path: azureml:amazon_review_merged_features_train@latest
  val_data:
    type: uri_folder
    path: azureml:amazon_review_merged_features_val@latest
  test_data:
    type: uri_folder
    path: azureml:amazon_review_merged_features_test@latest

outputs:
  model_output:
    type: uri_folder

search_space:
  C:
    type: uniform
    min_value: 0.01
    max_value: 10.0
  max_iter:
    type: choice
    values: [200, 300, 500, 800]

limits:
  max_total_trials: 8
  max_concurrent_trials: 2
  timeout: 3600
