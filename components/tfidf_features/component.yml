$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
name: tfidf_features
display_name: TFIDF Features
type: command

inputs:
  train:
    type: uri_folder
  val:
    type: uri_folder
  test:
    type: uri_folder

outputs:
  train_out:
    type: uri_folder
  val_out:
    type: uri_folder
  test_out:
    type: uri_folder

code: .
command: >-
  python tfidf.py
  --train ${{inputs.train}}
  --val ${{inputs.val}}
  --test ${{inputs.test}}
  --train_out ${{outputs.train_out}}
  --val_out ${{outputs.val_out}}
  --test_out ${{outputs.test_out}}

environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04:latest
  conda_file: conda.yml